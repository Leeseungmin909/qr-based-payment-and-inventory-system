<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>관리자 - 주문 검색 결과</title>
  <link rel="stylesheet" href="/css/admin-common.css">
  <link rel="stylesheet" href="/css/purchase-detail.css">
</head>
<body>
<div class="container">
  <nav class="sidebar">
    <ul class="sidebar-menu">
      <li class="category-title">관리자</li>
      <li><a href="/admin/products">상품 관리</a></li>
      <li><a href="/admin/purchases" class="active">주문/환불 관리</a></li>
      <li class="category-divider"></li>
      <li class="category-title">소비자</li>
    </ul>
  </nav>

  <main class="content">
    <h1>주문 검색 결과</h1>
    <p><strong>주문 ID: <span th:text="${purchase.purchaseId}">1</span></strong>에 대한 검색 결과입니다.</p>

    <table class="product-table">
      <thead>
      <tr>
        <th>주문 ID</th>
        <th>주문 시간</th>
        <th>총액</th>
        <th>주문 상태</th>
        <th>관리</th> </tr>
      </thead>
      <tbody>
      <tr th:object="${purchase}">
        <td th:text="*{purchaseId}"></td>
        <td th:text="${#temporals.format(purchase.purchaseDate, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="|*{totalAmount}원|"></td>
        <td th:text="*{state == T(min.example.QRp.domain.PurchaseState).COMPLETED} ? '구매완료' : '환불'"></td>
        <td>
          <a th:if="*{state == T(min.example.QRp.domain.PurchaseState).COMPLETED}"
             class="btn btn-refund"
             th:data-purchase-id="*{purchaseId}">
            환불
          </a>
          <span th:if="*{state == T(min.example.QRp.domain.PurchaseState).REFUNDED}"
                class="btn btn-refunded">
                                환불 완료
                            </span>
        </td>
      </tr>
      </tbody>
    </table>

    <h3>주문 상세 내역</h3>
    <table class="product-table item-table">
      <thead>
      <tr>
        <th>상품명</th>
        <th>주문 가격</th>
        <th>주문 수량</th>
        <th>합계</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="item : ${purchase.purchaseItems}">
        <td th:text="${item.productName}"></td>
        <td th:text="${item.orderPrice} + '원'"></td>
        <td th:text="${item.orderQuantity}"></td>
        <td th:text="${item.itemTotalAmount} + '원'"></td>
      </tr>
      </tbody>
    </table>

    <div class="button-bar">
      <a href="/admin/purchases" class="btn">전체 목록으로 돌아가기</a>
    </div>
  </main>
</div>

<script src="/js/admin-common.js"></script>
<script src="/js/purchase-detail.js"></script>
</body>
</html>
